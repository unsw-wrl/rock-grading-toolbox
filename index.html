<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rock Grading Tool</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px;
      line-height: 1.4;
    }

    .row {
      margin-bottom: 10px;
    }

    .controls {
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .progress-wrap {
      margin-top: 12px;
      display: none;
    }

    .progress-label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #333;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #e6e6e6;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #198754, #3bb273);
      transition: width 0.2s ease;
    }

    #output {
      margin-top: 14px;
      white-space: pre-wrap;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 12px;
      min-height: 80px;
      background: #fff;
    }

    #mixOutput {
      margin-top: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 12px;
      min-height: 80px;
      background: #fff;
    }

    .mix-meta {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .mix-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .mix-table th,
    .mix-table td {
      border: 1px solid #dcdcdc;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    .mix-table th {
      background: #f5f5f5;
    }

    .error {
      color: #b02a37;
    }

    .manual-adds {
      margin-top: 14px;
      border: 1px dashed #c8c8c8;
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }

    .manual-adds h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .section-divider {
      height: 1px;
      background: #d8d8d8;
      margin: 14px 0;
    }

    .manual-item {
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fafafa;
    }

    .manual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .manual-grid label {
      font-size: 12px;
      color: #444;
    }

    .manual-grid input {
      width: 100%;
      box-sizing: border-box;
    }

    .plots {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .plot-card {
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      min-height: 420px;
    }
  </style>
</head>
<body>

<h2>Rock Grading Tool</h2>

<div class="controls">
  <div class="manual-adds">
    <h3>Mass distribution (.csv)</h3>
    <div id="csvSourcesList"></div>
    <button type="button" onclick="addCsvSourceRow()">Add CSV Distribution</button>
  </div>

  <div class="manual-adds">
    <h3>Nominal Diameter distribution (manual)</h3>
    <div id="manualAddsList"></div>
    <button type="button" id="addManualBtn" onclick="addManualAddRow()">Add Manual Range</button>
  </div>

  <div class="section-divider"></div>

  <div class="manual-adds">
    <h3>Mass Targets</h3>
    <div id="massTargetsList"></div>
    <button type="button" onclick="addMassTargetRow()">Add Manual Targets</button>
    <button type="button" onclick="importTargetCsv('mass')">Add CSV Target</button>
  </div>

  <div class="manual-adds">
    <h3>Dn Targets</h3>
    <div id="dnTargetsList"></div>
    <button type="button" onclick="addDnTargetRow()">Add Manual Targets</button>
    <button type="button" onclick="importTargetCsv('dn')">Add CSV Target</button>
  </div>

  <div class="manual-adds">
    <h3>Mix Calculator</h3>
    <div class="row">
      <label>Target Total Mass (kg):</label>
      <input type="number" id="targetTotalMassKg" min="0" step="any" value="64">
    </div>
  </div>

  <button id="runButton" onclick="runPython()">Show Distributions</button>
  <button id="mixButton" onclick="calculateMix()">Calculate Mix</button>
  <input type="file" id="appPyFile" accept=".py,text/x-python" style="display:none">

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Starting...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<div id="output"></div>
<div id="mixOutput"></div>
<div class="plots">
  <div id="massPlot" class="plot-card"></div>
  <div id="dnPlot" class="plot-card"></div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<script>
let pyodide;
let appSourceCache = null;
let manualAddCounter = 0;
let csvSourceCounter = 0;
let massTargetCounter = 0;
let dnTargetCounter = 0;
const rhoS = 2.65;
const pyodideReadyPromise = initPyodide();

async function initPyodide() {
  setProgress(5, "Loading Python runtime...");
  pyodide = await loadPyodide();

  setProgress(25, "Loading Python packages (first run can take a while)...");
  await pyodide.loadPackage(["numpy", "pandas", "matplotlib"]);

  setProgress(100, "Python ready");
  hideProgressSoon();
}

function pickLocalAppPyFile() {
  return new Promise((resolve, reject) => {
    const input = document.getElementById("appPyFile");
    input.value = "";
    input.onchange = async () => {
      const f = input.files && input.files[0];
      if (!f) {
        reject(new Error("Local mode needs app.py selected once per page load."));
        return;
      }
      try {
        resolve(await f.text());
      } catch (e) {
        reject(new Error("Could not read selected app.py file."));
      }
    };
    input.click();
  });
}

async function ensureAppModuleLoaded() {
  if (appSourceCache) {
    pyodide.FS.writeFile("app.py", appSourceCache);
    return;
  }

  try {
    const resp = await fetch("./app.py", { cache: "no-store" });
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    appSourceCache = await resp.text();
  } catch (e) {
    if (window.location.protocol === "file:") {
      setProgress(45, "Select local app.py...");
      appSourceCache = await pickLocalAppPyFile();
    } else {
      throw new Error("Could not load app.py from site root.");
    }
  }

  pyodide.FS.writeFile("app.py", appSourceCache);
}

function setProgress(percent, label) {
  const wrap = document.getElementById("progressWrap");
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressLabel");
  wrap.style.display = "block";
  fill.style.width = `${percent}%`;
  text.textContent = label;
}

function hideProgressSoon() {
  setTimeout(() => {
    const wrap = document.getElementById("progressWrap");
    wrap.style.display = "none";
  }, 600);
}

function renderResult(result) {
  const out = document.getElementById("output");
  const massCount = result.mass_curve ? result.mass_curve.length : 0;
  const dnCount = result.dn_curve ? result.dn_curve.length : 0;

  let text = "Model completed.\n";
  text += `Sources: ${result.sources.join(", ")}\n`;
  text += `Mass curve points: ${massCount}\n`;
  text += `Dn curve points: ${dnCount}\n`;

  if (result.target_mix_fit_mse !== undefined) {
    text += `Target mix fit MSE: ${result.target_mix_fit_mse}\n`;
    text += "Target mix weights:\n";
    for (const [name, weight] of Object.entries(result.target_mix_weights || {})) {
      text += `  ${name}: ${(100 * weight).toFixed(2)}%\n`;
    }
  }

  out.classList.remove("error");
  out.textContent = text;
}

function toSafeId(raw) {
  return String(raw).replace(/[^a-zA-Z0-9_]+/g, "_");
}

function addCsvSourceRow(prefill = null) {
  csvSourceCounter += 1;
  const id = `csv_source_${csvSourceCounter}`;
  const wrap = document.createElement("div");
  wrap.className = "manual-item";
  wrap.dataset.csvSourceId = id;

  const d = prefill || {};
  wrap.innerHTML = `
    <div class="manual-grid">
      <div><label>Label</label><input type="text" class="csv-label" value="${d.label || id}"></div>
      <div><label>CSV File</label><input type="file" class="csv-file" accept=".csv,text/csv"></div>
      <div><label>Total Mass (kg)</label><input type="number" class="csv-total" min="0" step="any" value="${d.total_mass_kg ?? 20}"></div>
      <div><label>Shape Factor</label><input type="number" class="csv-shape" min="0" step="any" value="${d.shape_factor ?? 0.9}"></div>
      <div><button type="button" class="csv-remove">Remove</button></div>
    </div>
  `;

  const fileInput = wrap.querySelector(".csv-file");
  const labelInput = wrap.querySelector(".csv-label");
  fileInput.addEventListener("change", () => {
    const f = fileInput.files && fileInput.files[0];
    if (f && (!labelInput.value || labelInput.value === id)) {
      labelInput.value = toSafeId(f.name.replace(/\.[^.]+$/, ""));
    }
  });

  wrap.querySelector(".csv-remove").addEventListener("click", () => {
    wrap.remove();
  });

  document.getElementById("csvSourcesList").appendChild(wrap);
}

async function collectDistributions() {
  const rows = Array.from(document.querySelectorAll("#csvSourcesList .manual-item"));
  const out = {};
  let sourceIndex = 1;

  for (let i = 0; i < rows.length; i += 1) {
    const row = rows[i];
    const file = row.querySelector(".csv-file").files[0];
    if (!file) {
      continue;
    }

    const rowNum = i + 1;
    const labelRaw = row.querySelector(".csv-label").value.trim();
    const totalMassKg = parseFloat(row.querySelector(".csv-total").value);
    const shapeFactor = parseFloat(row.querySelector(".csv-shape").value);

    if (!Number.isFinite(totalMassKg) || totalMassKg <= 0) {
      throw new Error(`CSV row ${rowNum}: total mass must be > 0.`);
    }
    if (!Number.isFinite(shapeFactor) || shapeFactor <= 0) {
      throw new Error(`CSV row ${rowNum}: shape factor must be > 0.`);
    }

    let label = toSafeId(labelRaw || file.name.replace(/\.[^.]+$/, "") || `dist_${sourceIndex}`);
    if (!label) {
      label = `dist_${sourceIndex}`;
    }
    let suffix = 2;
    while (Object.prototype.hasOwnProperty.call(out, label)) {
      label = `${label}_${suffix}`;
      suffix += 1;
    }

    out[label] = {
      csv_text: await file.text(),
      total_mass_kg: totalMassKg,
      shape_factor: shapeFactor
    };
    sourceIndex += 1;
  }

  return out;
}

function addMassTargetRow(prefill = null) {
  massTargetCounter += 1;
  const id = `mass_target_${massTargetCounter}`;
  const wrap = document.createElement("div");
  wrap.className = "manual-item";
  wrap.dataset.massTargetId = id;
  const d = prefill || {};

  wrap.innerHTML = `
    <div class="manual-grid">
      <div><label>Label</label><input type="text" class="target-label" value="${d.label || id}"></div>
      <div><label>Mass (g)</label><input type="number" class="target-mass" min="0" step="any" value="${d.mass_g ?? ""}"></div>
      <div><label>% Passing</label><input type="number" class="target-pct" min="0" max="100" step="any" value="${d.pct_passing ?? ""}"></div>
      <div><label>Shape Factor</label><input type="number" class="target-shape" min="0" step="any" value="${d.shape_factor ?? 0.9}"></div>
      <div><button type="button" class="target-remove">Remove</button></div>
    </div>
  `;

  wrap.querySelector(".target-remove").addEventListener("click", () => wrap.remove());
  document.getElementById("massTargetsList").appendChild(wrap);
}

function addDnTargetRow(prefill = null) {
  dnTargetCounter += 1;
  const id = `dn_target_${dnTargetCounter}`;
  const wrap = document.createElement("div");
  wrap.className = "manual-item";
  wrap.dataset.dnTargetId = id;
  const d = prefill || {};

  wrap.innerHTML = `
    <div class="manual-grid">
      <div><label>Label</label><input type="text" class="target-label" value="${d.label || id}"></div>
      <div><label>Dn (mm)</label><input type="number" class="target-dn" min="0" step="any" value="${d.dn_mm ?? ""}"></div>
      <div><label>% Passing</label><input type="number" class="target-pct" min="0" max="100" step="any" value="${d.pct_passing ?? ""}"></div>
      <div><label>Shape Factor</label><input type="number" class="target-shape" min="0" step="any" value="${d.shape_factor ?? 0.9}"></div>
      <div><button type="button" class="target-remove">Remove</button></div>
    </div>
  `;

  wrap.querySelector(".target-remove").addEventListener("click", () => wrap.remove());
  document.getElementById("dnTargetsList").appendChild(wrap);
}

function splitCsvLine(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i += 1) {
    const ch = line[i];
    if (ch === "\"") {
      if (inQuotes && i + 1 < line.length && line[i + 1] === "\"") {
        cur += "\"";
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (ch === "," && !inQuotes) {
      out.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  out.push(cur.trim());
  return out;
}

function normalizeHeader(s) {
  return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
}

function parseTargetCsvText(csvText, kind) {
  const lines = String(csvText)
    .split(/\r?\n/)
    .map((l) => l.trim())
    .filter((l) => l.length > 0);

  if (lines.length === 0) {
    throw new Error("Target CSV is empty.");
  }

  const first = splitCsvLine(lines[0]);
  const headerNorm = first.map(normalizeHeader);
  const hasHeader = headerNorm.some((h) => h.includes("passing") || h.includes("label") || h.includes("shape"));

  let startIdx = 0;
  let idxLabel = 0;
  let idxValue = 1;
  let idxPct = 2;
  let idxShape = 3;

  if (hasHeader) {
    startIdx = 1;
    idxLabel = headerNorm.findIndex((h) => h.includes("label"));
    idxPct = headerNorm.findIndex((h) => h.includes("passing"));
    idxShape = headerNorm.findIndex((h) => h.includes("shape"));
    if (kind === "mass") {
      idxValue = headerNorm.findIndex((h) => h.includes("mass"));
    } else {
      idxValue = headerNorm.findIndex((h) => h.includes("dn"));
    }
    if (idxValue < 0 || idxPct < 0 || idxShape < 0) {
      throw new Error(`Target CSV header must include ${kind === "mass" ? "Mass (g)" : "Dn (mm)"}, % Passing, and Shape Factor.`);
    }
    if (idxLabel < 0) {
      idxLabel = -1;
    }
  }

  const rows = [];
  for (let i = startIdx; i < lines.length; i += 1) {
    const cols = splitCsvLine(lines[i]);
    if (cols.length === 0) {
      continue;
    }
    const label = idxLabel >= 0 ? (cols[idxLabel] || "").trim() : "";
    const v = parseFloat(cols[idxValue] || "");
    const pct = parseFloat(cols[idxPct] || "");
    const shape = parseFloat(cols[idxShape] || "");
    if (!Number.isFinite(v) || !Number.isFinite(pct) || !Number.isFinite(shape)) {
      continue;
    }
    rows.push({
      label: label || `${kind}_target_csv_${rows.length + 1}`,
      value: v,
      pct_passing: pct,
      shape_factor: shape
    });
  }

  if (rows.length === 0) {
    throw new Error("No valid target rows found in CSV.");
  }
  return rows;
}

async function importTargetCsv(kind) {
  const picker = document.createElement("input");
  picker.type = "file";
  picker.accept = ".csv,text/csv";
  picker.style.display = "none";
  document.body.appendChild(picker);

  picker.onchange = async () => {
    try {
      const file = picker.files && picker.files[0];
      if (!file) {
        return;
      }
      const text = await file.text();
      const parsed = parseTargetCsvText(text, kind);
      for (const r of parsed) {
        if (kind === "mass") {
          addMassTargetRow({
            label: r.label,
            mass_g: r.value,
            pct_passing: r.pct_passing,
            shape_factor: r.shape_factor
          });
        } else {
          addDnTargetRow({
            label: r.label,
            dn_mm: r.value,
            pct_passing: r.pct_passing,
            shape_factor: r.shape_factor
          });
        }
      }
    } catch (err) {
      const out = document.getElementById("output");
      out.classList.add("error");
      out.textContent = `Error: ${err.message || err}`;
    } finally {
      document.body.removeChild(picker);
    }
  };

  picker.click();
}

function collectMassTargets() {
  const rows = Array.from(document.querySelectorAll("#massTargetsList .manual-item"));
  const targets = [];
  for (let i = 0; i < rows.length; i += 1) {
    const row = rows[i];
    const label = row.querySelector(".target-label").value.trim() || `mass_target_${i + 1}`;
    const mass = parseFloat(row.querySelector(".target-mass").value);
    const pct = parseFloat(row.querySelector(".target-pct").value);
    const shape = parseFloat(row.querySelector(".target-shape").value);

    const allEmpty = !row.querySelector(".target-mass").value && !row.querySelector(".target-pct").value;
    if (allEmpty) {
      continue;
    }
    if (!Number.isFinite(mass) || mass <= 0) {
      throw new Error(`Mass target row ${i + 1}: mass must be > 0.`);
    }
    if (!Number.isFinite(pct) || pct < 0 || pct > 100) {
      throw new Error(`Mass target row ${i + 1}: % passing must be between 0 and 100.`);
    }
    if (!Number.isFinite(shape) || shape <= 0) {
      throw new Error(`Mass target row ${i + 1}: shape factor must be > 0.`);
    }
    targets.push({ label, mass_g: mass, pct_passing: pct, shape_factor: shape });
  }
  return targets;
}

function collectDnTargets() {
  const rows = Array.from(document.querySelectorAll("#dnTargetsList .manual-item"));
  const targets = [];
  for (let i = 0; i < rows.length; i += 1) {
    const row = rows[i];
    const label = row.querySelector(".target-label").value.trim() || `dn_target_${i + 1}`;
    const dn = parseFloat(row.querySelector(".target-dn").value);
    const pct = parseFloat(row.querySelector(".target-pct").value);
    const shape = parseFloat(row.querySelector(".target-shape").value);

    const allEmpty = !row.querySelector(".target-dn").value && !row.querySelector(".target-pct").value;
    if (allEmpty) {
      continue;
    }
    if (!Number.isFinite(dn) || dn <= 0) {
      throw new Error(`Dn target row ${i + 1}: Dn must be > 0.`);
    }
    if (!Number.isFinite(pct) || pct < 0 || pct > 100) {
      throw new Error(`Dn target row ${i + 1}: % passing must be between 0 and 100.`);
    }
    if (!Number.isFinite(shape) || shape <= 0) {
      throw new Error(`Dn target row ${i + 1}: shape factor must be > 0.`);
    }
    targets.push({ label, dn_mm: dn, pct_passing: pct, shape_factor: shape });
  }
  return targets;
}

function massToDnMm(massG, shapeFactor) {
  const v = massG / rhoS;
  const dSphereCm = Math.pow((6 * v) / Math.PI, 1 / 3);
  const dSphereMm = dSphereCm * 10.0;
  return shapeFactor * dSphereMm;
}

function dnToMassG(dnMm, shapeFactor) {
  const dSphereCm = (dnMm / shapeFactor) / 10.0;
  const volCm3 = (Math.PI / 6.0) * Math.pow(dSphereCm, 3);
  return rhoS * volCm3;
}

function buildDnTargetsForMix(massTargets, dnTargets) {
  const merged = [];
  for (const t of dnTargets || []) {
    merged.push({
      label: t.label,
      dn_mm: t.dn_mm,
      pct_passing: t.pct_passing
    });
  }
  for (const t of massTargets || []) {
    merged.push({
      label: `${t.label}_from_mass`,
      dn_mm: massToDnMm(t.mass_g, t.shape_factor),
      pct_passing: t.pct_passing
    });
  }
  return merged;
}

function addManualAddRow(prefill = null) {
  manualAddCounter += 1;
  const id = `manual_add_${manualAddCounter}`;
  const wrap = document.createElement("div");
  wrap.className = "manual-item";
  wrap.dataset.manualId = id;

  const d = prefill || {};
  wrap.innerHTML = `
    <div class="manual-grid">
      <div><label>Label</label><input type="text" class="manual-label" value="${d.label || id}"></div>
      <div><label>Total Mass (kg)</label><input type="number" class="manual-total" min="0" step="any" value="${d.total_mass_kg ?? ""}"></div>
      <div><label>Dn Min (mm)</label><input type="number" class="manual-dn-min" min="0" step="any" value="${d.dn_min_mm ?? ""}"></div>
      <div><label>Dn Max (mm)</label><input type="number" class="manual-dn-max" min="0" step="any" value="${d.dn_max_mm ?? ""}"></div>
      <div><label>Shape Factor</label><input type="number" class="manual-shape" min="0" step="any" value="${d.shape_factor ?? 0.9}"></div>
      <div><label>Points</label><input type="number" class="manual-n-points" min="2" step="1" value="${d.n_points ?? 30}"></div>
      <div><button type="button" class="manual-remove">Remove</button></div>
    </div>
  `;

  wrap.querySelector(".manual-remove").addEventListener("click", () => {
    wrap.remove();
  });

  document.getElementById("manualAddsList").appendChild(wrap);
}

function collectManualAdds() {
  const rows = Array.from(document.querySelectorAll("#manualAddsList .manual-item"));
  const out = {};

  for (let i = 0; i < rows.length; i += 1) {
    const row = rows[i];
    const rowNum = i + 1;
    const labelRaw = row.querySelector(".manual-label").value.trim();
    const totalRaw = row.querySelector(".manual-total").value;
    const dnMinRaw = row.querySelector(".manual-dn-min").value;
    const dnMaxRaw = row.querySelector(".manual-dn-max").value;
    const shapeRaw = row.querySelector(".manual-shape").value;
    const pointsRaw = row.querySelector(".manual-n-points").value;

    const allEmpty = !labelRaw && !totalRaw && !dnMinRaw && !dnMaxRaw && !shapeRaw && !pointsRaw;
    if (allEmpty) {
      continue;
    }

    const totalMassKg = parseFloat(totalRaw);
    const dnMinMm = parseFloat(dnMinRaw);
    const dnMaxMm = parseFloat(dnMaxRaw);
    const shapeFactor = parseFloat(shapeRaw);
    const nPoints = parseInt(pointsRaw || "30", 10);

    if (!Number.isFinite(totalMassKg) || totalMassKg <= 0) {
      throw new Error(`Manual add row ${rowNum}: total mass must be > 0.`);
    }
    if (!Number.isFinite(dnMinMm) || dnMinMm <= 0) {
      throw new Error(`Manual add row ${rowNum}: Dn min must be > 0.`);
    }
    if (!Number.isFinite(dnMaxMm) || dnMaxMm <= 0) {
      throw new Error(`Manual add row ${rowNum}: Dn max must be > 0.`);
    }
    if (!Number.isFinite(shapeFactor) || shapeFactor <= 0) {
      throw new Error(`Manual add row ${rowNum}: shape factor must be > 0.`);
    }
    if (!Number.isFinite(nPoints) || nPoints < 2) {
      throw new Error(`Manual add row ${rowNum}: points must be at least 2.`);
    }

    let label = labelRaw || `manual_${rowNum}`;
    let suffix = 2;
    while (Object.prototype.hasOwnProperty.call(out, label)) {
      label = `${labelRaw || `manual_${rowNum}`}_${suffix}`;
      suffix += 1;
    }

    out[label] = {
      total_mass_kg: totalMassKg,
      dn_min_mm: dnMinMm,
      dn_max_mm: dnMaxMm,
      shape_factor: shapeFactor,
      n_points: nPoints
    };
  }

  return out;
}

async function runPython() {
  const runButton = document.getElementById("runButton");
  const mixButton = document.getElementById("mixButton");
  const out = document.getElementById("output");

  try {
    out.classList.remove("error");
    out.textContent = "";

    runButton.disabled = true;
    mixButton.disabled = true;

    setProgress(10, "Waiting for Python to be ready...");
    await pyodideReadyPromise;

    setProgress(35, "Loading model code...");
    await ensureAppModuleLoaded();

    setProgress(50, "Reading inputs...");

    const distributions = await collectDistributions();
    const manualAdds = collectManualAdds();
    const massTargets = collectMassTargets();
    const dnTargets = collectDnTargets();

    if (Object.keys(distributions).length === 0 && Object.keys(manualAdds).length === 0) {
      throw new Error("Provide at least one CSV distribution or one manual Dn addition.");
    }

    const config = {
      distributions,
      manual_adds: manualAdds,
      do_plots: false
    };

    setProgress(65, "Running model...");
    pyodide.globals.set("config_js", config);

    await pyodide.runPythonAsync(`
import json
from app import run_model

config = config_js.to_py()
result = run_model(config)
result_json = json.dumps(result)
    `);

    setProgress(90, "Formatting results...");
    const resultJson = pyodide.globals.get("result_json");
    const result = JSON.parse(resultJson);

    const targets = {
      mass_targets: massTargets,
      dn_targets: dnTargets
    };

    renderResult(result);
    renderPlots(result, targets);
    setProgress(100, "Done");
    hideProgressSoon();
  } catch (err) {
    out.classList.add("error");
    out.textContent = `Error: ${err.message || err}`;
    if (typeof Plotly !== "undefined") {
      Plotly.purge("massPlot");
      Plotly.purge("dnPlot");
    }
    setProgress(100, "Run failed");
  } finally {
    runButton.disabled = false;
    mixButton.disabled = false;
  }
}

function renderMixResult(result) {
  const out = document.getElementById("mixOutput");
  const singleFits = result.single_source_fits || [];
  const recs = result.recommendations || [];
  const targetTotal = Number(result.target_total_mass_kg) || 0;
  const currentTotal = recs.reduce((s, r) => s + (Number(r.current_mass_kg) || 0), 0);

  let singleSourceHtml = "";
  if (singleFits.length > 0) {
    const rows = singleFits.map((s) =>
      `<tr>
        <td>${s.label}</td>
        <td>${Number(s.current_mass_kg).toFixed(2)}</td>
        <td>${Number(s.max_abs_diff_pct).toFixed(2)}</td>
      </tr>`
    ).join("");
    singleSourceHtml = `
      <div class="mix-meta"><strong>Single-source fits (can be used directly)</strong></div>
      <table class="mix-table" style="margin-bottom:10px;">
        <thead>
          <tr>
            <th>Source</th>
            <th>Current Mass (kg)</th>
            <th>Max Diff (%)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } else {
    singleSourceHtml = `<div class="mix-meta">No single source fully matches the target grading + mass.</div>`;
  }

  const recRows = recs.map((r) => {
    let threshold = "";
    if (r.threshold_dn_mm !== null && r.threshold_dn_mm !== undefined) {
      threshold = `Dn ${Number(r.threshold_dn_mm).toFixed(2)} mm`;
      if (r.threshold_mass_g !== null && r.threshold_mass_g !== undefined) {
        threshold += ` (~${Number(r.threshold_mass_g).toFixed(2)} g)`;
      }
    }
    const currentPctOfTarget = targetTotal > 0
      ? (100 * Number(r.current_mass_kg) / targetTotal)
      : 0;
    return `
      <tr>
        <td>${r.source}</td>
        <td>${Number(r.current_mass_kg).toFixed(2)}</td>
        <td>${currentPctOfTarget.toFixed(2)}</td>
        <td>${Number(r.recommended_percent).toFixed(2)}</td>
        <td>${Number(r.recommended_mass_kg).toFixed(2)}</td>
        <td>${Number(r.delta_kg_required_minus_current).toFixed(2)}</td>
        <td>${r.guidance || ""}</td>
        <td>${threshold}</td>
      </tr>
    `;
  }).join("");

  out.classList.remove("error");
  out.innerHTML = `
    <div class="mix-meta"><strong>Mix calculation completed</strong></div>
    <div class="mix-meta">Fit MSE: ${Number(result.fit_mse).toPrecision(6)} | Current total: ${currentTotal.toFixed(2)} kg | Target total: ${targetTotal.toFixed(2)} kg</div>
    ${singleSourceHtml}
    <table class="mix-table">
      <thead>
        <tr>
          <th>Source</th>
          <th>Current Mass (kg)</th>
          <th>Current (% of Target)</th>
          <th>Required (% of Target)</th>
          <th>Required Mass (kg)</th>
          <th>Delta (Required-Current, kg)</th>
          <th>Guidance</th>
          <th>Trim Threshold</th>
        </tr>
      </thead>
      <tbody>${recRows}</tbody>
    </table>
  `;
}

async function calculateMix() {
  const runButton = document.getElementById("runButton");
  const mixButton = document.getElementById("mixButton");
  const mixOut = document.getElementById("mixOutput");

  try {
    mixOut.classList.remove("error");
    mixOut.textContent = "";

    runButton.disabled = true;
    mixButton.disabled = true;

    setProgress(10, "Waiting for Python to be ready...");
    await pyodideReadyPromise;

    setProgress(35, "Loading model code...");
    await ensureAppModuleLoaded();

    setProgress(50, "Reading inputs...");
    const distributions = await collectDistributions();
    const manualAdds = collectManualAdds();
    const massTargets = collectMassTargets();
    const dnTargets = collectDnTargets();

    if (Object.keys(distributions).length === 0 && Object.keys(manualAdds).length === 0) {
      throw new Error("Calculate Mix needs at least one rock source.");
    }
    if (massTargets.length === 0 && dnTargets.length === 0) {
      throw new Error("Calculate Mix needs at least one target value.");
    }

    const targetTotalMassKg = parseFloat(document.getElementById("targetTotalMassKg").value);
    if (!Number.isFinite(targetTotalMassKg) || targetTotalMassKg <= 0) {
      throw new Error("Target Total Mass (kg) must be > 0.");
    }

    const targetDnPoints = buildDnTargetsForMix(massTargets, dnTargets);
    const mixConfig = {
      distributions,
      manual_adds: manualAdds,
      target_spec: {
        target_total_mass_kg: targetTotalMassKg,
        dn_targets: targetDnPoints,
        min_source_fraction: 0.0,
        diversity_penalty: 0.01,
        max_iter: 3000,
        learning_rate: 0.2,
        single_source_tol_pct: 3.0
      }
    };

    setProgress(70, "Calculating recommended mix...");
    pyodide.globals.set("mix_config_js", mixConfig);

    await pyodide.runPythonAsync(`
import json
from app import calculate_mix

mix_config = mix_config_js.to_py()
mix_result = calculate_mix(mix_config)
mix_result_json = json.dumps(mix_result)
    `);

    setProgress(90, "Formatting mix result...");
    const mixResultJson = pyodide.globals.get("mix_result_json");
    const mixResult = JSON.parse(mixResultJson);
    renderMixResult(mixResult);
    renderMixPlots(mixResult, { mass_targets: massTargets, dn_targets: dnTargets });

    setProgress(100, "Done");
    hideProgressSoon();
  } catch (err) {
    mixOut.classList.add("error");
    mixOut.textContent = `Error: ${err.message || err}`;
    setProgress(100, "Run failed");
  } finally {
    runButton.disabled = false;
    mixButton.disabled = false;
  }
}
